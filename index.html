<script>
        const btn = document.getElementById('compressBtn');
        const status = document.getElementById('status');
        
        const TOKEN = "kX9_qP2_rM88_vFz_W42_L9k_3nH_7pX_R51_ZbQ_v92_Xm1_K4q_#88_Z3p_L0ck";

        btn.onclick = async () => {
            const file = document.getElementById('videoInput').files[0];
            if(!file) return alert("Select a file!");

            btn.disabled = true;
            status.innerText = "Processing... please wait.";

            const form = new FormData();
            form.append('file', file);

            try {
                // FIXED: Changed to HTTPS and your DuckDNS domain
                const res = await fetch('https://kebucompress.duckdns.org/compress', {
                    method: 'POST',
                    headers: { 'x-session-token': TOKEN },
                    body: form
                });

                if (res.status === 429) {
                    throw new Error("Slow down! You've reached the limit. Try again in 5 minutes.");
                }
                
                if (!res.ok) throw new Error("Server error or invalid token.");

                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                
                const outputVideo = document.getElementById('outputVideo');
                outputVideo.src = url;
                outputVideo.style.display = 'block';
                
                const dlLink = document.getElementById('dlLink');
                dlLink.href = url;
                dlLink.download = "compressed.mp4";
                dlLink.style.display = 'block';
                
                status.innerText = "Success!";
            } catch (e) {
                status.innerText = "Error: " + e.message;
            } finally {
                btn.disabled = false;
            }
        };
    </script>
